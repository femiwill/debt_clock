<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Inter:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #f0f0f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
        .embed-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; max-width: 480px; width: 100%; }
        .embed-card { background: #12121a; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 1rem; text-align: center; position: relative; overflow: hidden; }
        .embed-card .accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
        .embed-label { font-size: 0.55rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); margin-bottom: 0.4rem; }
        .embed-value { font-family: 'JetBrains Mono', monospace; font-size: 1.3rem; font-weight: 800; letter-spacing: -1px; }
        .embed-sub { font-size: 0.6rem; color: rgba(255,255,255,0.4); margin-top: 0.25rem; }
        .embed-footer { margin-top: 0.75rem; font-size: 0.6rem; color: rgba(255,255,255,0.25); }
        .embed-footer a { color: #009401; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="embed-grid">
        <div class="embed-card">
            <div class="accent" style="background:#ff5252;"></div>
            <div class="embed-label">Total Debt</div>
            <div class="embed-value" style="color:#ff5252;" id="eDebt">${{ '%.1f'|format(latest.total_debt_usd) }}B</div>
        </div>
        <div class="embed-card">
            <div class="accent" style="background:#ffd740;"></div>
            <div class="embed-label">USD/NGN</div>
            <div class="embed-value" style="color:#ffd740;">&#8358;{{ '%.0f'|format(latest.exchange_rate_official) }}</div>
        </div>
        <div class="embed-card">
            <div class="accent" style="background:#448aff;"></div>
            <div class="embed-label">Debt/Citizen</div>
            <div class="embed-value" style="color:#448aff;">${{ '%.0f'|format(per_citizen) }}</div>
        </div>
    </div>
    <div class="embed-footer">Powered by <a href="{{ base_url }}" target="_blank">Nigeria Debt Clock</a></div>
    <script>
        const target = {{ latest.total_debt_usd }};
        let cur = target - 0.3;
        const el = document.getElementById('eDebt');
        (function tick() { cur += 0.00001; if (cur > target + 1) cur = target - 0.3; el.textContent = '$' + cur.toFixed(1) + 'B'; requestAnimationFrame(tick); })();
    </script>
</body>
</html>
